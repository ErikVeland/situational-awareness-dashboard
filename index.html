<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Situational Awareness Dashboard</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap"
      rel="stylesheet"
    />
    <!--
      Apply the stored theme before React hydrates to prevent a flash of the
      wrong theme. We default to 'dark' when no preference is stored.
    -->
    <script>
      try {
        if (localStorage.getItem('theme') !== 'light') {
          document.documentElement.classList.add('dark');
        }
      } catch (_) {}
    </script>
  </head>
  <body class="bg-bg font-sans antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
